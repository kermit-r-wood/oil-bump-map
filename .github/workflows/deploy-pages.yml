name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages artifact 上传 + 部署需要这些权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的 push 会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # 把 web/ 目录打包成 Pages artifact。
      # 注意：我们没有 build 步骤；纯静态资源直接上传即可。
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
